version: 2.1

# Define reusable orbs for common tasks
orbs:
  python: circleci/python@2.1.1
  browser-tools: circleci/browser-tools@1.4.0

# Define contexts for environment variables
# Contexts are created in CircleCI web UI under Organization Settings
contexts:
  # Development context - contains dev environment secrets
  development:
    description: "Development environment variables"
    
  # Production context - contains production secrets
  production:
    description: "Production environment variables"
    
  # Testing context - contains test environment secrets
  testing:
    description: "Testing environment variables"

# Define workflows
workflows:
  # Main CI/CD pipeline
  build-and-deploy:
    jobs:
      # Test job - runs on all branches
      test:
        context: testing
        filters:
          branches:
            ignore: /^dependabot\/.*/
      
      # Security scan job
      security:
        context: testing
        filters:
          branches:
            ignore: /^dependabot\/.*/
      
      # Deploy to staging - runs on develop branch
      deploy-staging:
        context: development
        requires:
          - test
          - security
        filters:
          branches:
            only: develop
      
      # Deploy to production - runs on main branch
      deploy-production:
        context: production
        requires:
          - test
          - security
        filters:
          branches:
            only: main

# Define jobs
jobs:
  # Test job - runs tests and checks
  test:
    docker:
      - image: cimg/python:3.11
        environment:
          # Environment variables from CircleCI context
          DJANGO_SETTINGS_MODULE: tasksphere.settings
          DEBUG: false
          SECRET_KEY: ${DJANGO_SECRET_KEY}
          DB_NAME: ${DB_NAME}
          DB_ENGINE: django.db.backends.sqlite3
          ALLOWED_HOSTS: localhost,127.0.0.1
    
    working_directory: ~/repo
    
    steps:
      # Checkout code
      - checkout
      
      # Setup Python environment
      - python/install-packages:
          pkg-manager: pip
          pip-dependency-file: requirements.txt
      
      # Create environment file
      - run:
          name: Create environment file
          command: |
            cat > .env << EOF
            DEBUG=false
            SECRET_KEY=${DJANGO_SECRET_KEY}
            DB_NAME=${DB_NAME}
            DB_ENGINE=django.db.backends.sqlite3
            ALLOWED_HOSTS=localhost,127.0.0.1
            DJANGO_SETTINGS_MODULE=tasksphere.settings
            EOF
      
      # Run Django migrations
      - run:
          name: Run Django migrations
          command: |
            python manage.py migrate
      
      # Run tests
      - run:
          name: Run tests
          command: |
            python manage.py test --verbosity=2
      
      # Run Django checks
      - run:
          name: Django system checks
          command: |
            python manage.py check --deploy
      
      # Collect static files
      - run:
          name: Collect static files
          command: |
            python manage.py collectstatic --noinput
      
      # Store test results
      - store_test_results:
          path: test-results
      
      # Store artifacts
      - store_artifacts:
          path: staticfiles
          destination: staticfiles

  # Security scan job
  security:
    docker:
      - image: cimg/python:3.11
    
    working_directory: ~/repo
    
    steps:
      # Checkout code
      - checkout
      
      # Install dependencies
      - python/install-packages:
          pkg-manager: pip
          pip-dependency-file: requirements.txt
      
      # Install security tools
      - run:
          name: Install security tools
          command: |
            pip install safety bandit
      
      # Run safety check for dependency vulnerabilities
      - run:
          name: Run safety check
          command: |
            safety check --json --output safety-report.json || true
      
      # Run bandit security linter
      - run:
          name: Run bandit security scan
          command: |
            bandit -r . -f json -o bandit-report.json || true
      
      # Store security reports
      - store_artifacts:
          path: safety-report.json
          destination: safety-report
      
      - store_artifacts:
          path: bandit-report.json
          destination: bandit-report

  # Deploy to staging
  deploy-staging:
    docker:
      - image: cimg/python:3.11
        environment:
          DEPLOY_ENVIRONMENT: staging
          SECRET_KEY: ${DJANGO_SECRET_KEY}
          DB_NAME: ${DB_NAME}
          DB_USER: ${DB_USER}
          DB_PASSWORD: ${DB_PASSWORD}
          DB_HOST: ${DB_HOST}
          DB_PORT: ${DB_PORT}
          ALLOWED_HOSTS: ${ALLOWED_HOSTS}
    
    working_directory: ~/repo
    
    steps:
      # Checkout code
      - checkout
      
      # Setup deployment environment
      - run:
          name: Setup deployment environment
          command: |
            echo "Setting up staging deployment..."
            echo "Deploying to: ${DEPLOY_ENVIRONMENT}"
      
      # Create production environment file
      - run:
          name: Create production environment file
          command: |
            cat > .env << EOF
            DEBUG=false
            SECRET_KEY=${DJANGO_SECRET_KEY}
            DB_NAME=${DB_NAME}
            DB_USER=${DB_USER}
            DB_PASSWORD=${DB_PASSWORD}
            DB_HOST=${DB_HOST}
            DB_PORT=${DB_PORT}
            DB_ENGINE=django.db.backends.postgresql
            ALLOWED_HOSTS=${ALLOWED_HOSTS}
            CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
            EOF
      
      # Install dependencies
      - python/install-packages:
          pkg-manager: pip
          pip-dependency-file: requirements.txt
      
      # Run migrations
      - run:
          name: Run database migrations
          command: |
            python manage.py migrate
      
      # Collect static files
      - run:
          name: Collect static files
          command: |
            python manage.py collectstatic --noinput
      
      # Deploy application (placeholder for actual deployment)
      - run:
          name: Deploy to staging
          command: |
            echo "Deploying to staging environment..."
            echo "Deployment completed successfully!"
            # Add your actual deployment commands here
            # Examples:
            # - gunicorn deployment
            # - Docker deployment
            # - rsync to server
            # - AWS ECS deployment

  # Deploy to production
  deploy-production:
    docker:
      - image: cimg/python:3.11
        environment:
          DEPLOY_ENVIRONMENT: production
          SECRET_KEY: ${DJANGO_SECRET_KEY}
          DB_NAME: ${DB_NAME}
          DB_USER: ${DB_USER}
          DB_PASSWORD: ${DB_PASSWORD}
          DB_HOST: ${DB_HOST}
          DB_PORT: ${DB_PORT}
          ALLOWED_HOSTS: ${ALLOWED_HOSTS}
          DEPLOY_HOST: ${DEPLOY_HOST}
          DEPLOY_USER: ${DEPLOY_USER}
          DEPLOY_KEY: ${DEPLOY_KEY}
          DEPLOY_PATH: ${DEPLOY_PATH}
    
    working_directory: ~/repo
    
    steps:
      # Checkout code
      - checkout
      
      # Setup deployment environment
      - run:
          name: Setup deployment environment
          command: |
            echo "Setting up production deployment..."
            echo "Deploying to: ${DEPLOY_ENVIRONMENT}"
      
      # Create production environment file
      - run:
          name: Create production environment file
          command: |
            cat > .env << EOF
            DEBUG=false
            SECRET_KEY=${DJANGO_SECRET_KEY}
            DB_NAME=${DB_NAME}
            DB_USER=${DB_USER}
            DB_PASSWORD=${DB_PASSWORD}
            DB_HOST=${DB_HOST}
            DB_PORT=${DB_PORT}
            DB_ENGINE=django.db.backends.postgresql
            ALLOWED_HOSTS=${ALLOWED_HOSTS}
            CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
            EOF
      
      # Install dependencies
      - python/install-packages:
          pkg-manager: pip
          pip-dependency-file: requirements.txt
      
      # Run migrations
      - run:
          name: Run database migrations
          command: |
            python manage.py migrate
      
      # Collect static files
      - run:
          name: Collect static files
          command: |
            python manage.py collectstatic --noinput
      
      # Health check before deployment
      - run:
          name: Pre-deployment health check
          command: |
            python manage.py check --deploy
      
      # Deploy application (placeholder for actual deployment)
      - run:
          name: Deploy to production
          command: |
            echo "Deploying to production environment..."
            echo "Deployment completed successfully!"
            # Add your actual deployment commands here
            # Examples:
            # - gunicorn deployment
            # - Docker deployment
            # - rsync to server
            # - AWS ECS deployment
            # - Kubernetes deployment
      
      # Post-deployment verification
      - run:
          name: Post-deployment verification
          command: |
            echo "Verifying deployment..."
            # Add health checks, smoke tests, etc.
            echo "Deployment verification completed!"
