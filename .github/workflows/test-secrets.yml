name: Test Secrets Integration

on:
  workflow_dispatch:  # Allow manual triggering for testing
  push:
    branches: [ test-secrets ]

jobs:
  test-secrets:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-dotenv
        pip install -r requirements.txt

    - name: Create test environment file
      run: |
        cat > .env << EOF
        DEBUG=True
        SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY || 'test-secret-key-for-development' }}
        DB_NAME=${{ secrets.DB_NAME || 'db.sqlite3' }}
        DB_USER=${{ secrets.DB_USER || '' }}
        DB_PASSWORD=${{ secrets.DB_PASSWORD || '' }}
        DB_HOST=${{ secrets.DB_HOST || 'localhost' }}
        DB_PORT=${{ secrets.DB_PORT || '5432' }}
        DB_ENGINE=django.db.backends.sqlite3
        ALLOWED_HOSTS=localhost,127.0.0.1
        CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
        EOF

    - name: Verify environment file
      run: |
        echo "Environment file contents:"
        cat .env
        echo ""
        echo "Environment variables loaded:"
        python -c "
import os
from dotenv import load_dotenv
load_dotenv()
print(f'DJANGO_SECRET_KEY: {os.getenv(\"SECRET_KEY\", \"NOT_SET\")[:20]}...')
print(f'DB_NAME: {os.getenv(\"DB_NAME\", \"NOT_SET\")}')
print(f'DB_HOST: {os.getenv(\"DB_HOST\", \"NOT_SET\")}')
print(f'ALLOWED_HOSTS: {os.getenv(\"ALLOWED_HOSTS\", \"NOT_SET\")}')
"

    - name: Test Django configuration
      run: |
        python manage.py check --settings=tasksphere.settings

    - name: Test database connection
      run: |
        python manage.py migrate --settings=tasksphere.settings
        python manage.py check --database default --settings=tasksphere.settings

    - name: Test API with secrets
      run: |
        python -c "
import os
import django
from dotenv import load_dotenv

load_dotenv()
os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'tasksphere.settings')
django.setup()

from django.test import Client
from django.contrib.auth.models import User

# Test that configuration is loaded
print('✅ Django configuration loaded successfully')
print(f'✅ Database engine: {os.getenv(\"DB_ENGINE\")}')
print(f'✅ Debug mode: {os.getenv(\"DEBUG\")}')

# Test basic functionality
client = Client()
response = client.get('/api/')
print(f'✅ API root accessible: {response.status_code == 200}')

print('✅ All secrets integration tests passed!')
"

    - name: Security check
      run: |
        echo "Checking for exposed secrets in logs..."
        if grep -r "password\|secret\|key" . --exclude-dir=.git --exclude="*.md" --exclude="SECRETS_*" --exclude=".env*"; then
          echo "⚠️  Warning: Potential secrets found in code"
        else
          echo "✅ No exposed secrets detected"
        fi
