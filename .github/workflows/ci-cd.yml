name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install python-dotenv  # Ensure dotenv is available

    - name: Create environment file
      run: |
        cat > .env << EOF
        DEBUG=False
        SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY || 'test-secret-key-for-ci-cd' }}
        DB_NAME=db.sqlite3
        DB_ENGINE=django.db.backends.sqlite3
        ALLOWED_HOSTS=localhost,127.0.0.1
        DJANGO_SETTINGS_MODULE=tasksphere.settings
        EOF

    - name: Run Django migrations
      run: |
        python manage.py migrate --settings=tasksphere.settings

    - name: Run tests
      run: |
        python manage.py test --settings=tasksphere.settings

    - name: Run Django checks
      run: |
        python manage.py check --deploy

    - name: Collect static files
      run: |
        python manage.py collectstatic --noinput

  security:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install safety bandit
        pip install -r requirements.txt

    - name: Run security checks
      run: |
        safety check --json --output safety-report.json || true
        bandit -r . -f json -o bandit-report.json || true

    - name: Upload security reports
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          safety-report.json
          bandit-report.json

  docker-build:
    needs: [test, security]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: github.event_name == 'pull_request' || (github.ref == 'refs/heads/main' && github.event_name == 'push')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        docker build -t tasksphere-backend:${{ github.sha }} .
        docker tag tasksphere-backend:${{ github.sha }} tasksphere-backend:latest

    - name: Test Docker image
      run: |
        docker run -d -p 8000:8000 --name test-container tasksphere-backend:${{ github.sha }}
        sleep 5
        docker ps | grep test-container
        docker stop test-container
        docker rm test-container

    - name: Log in to GitHub Container Registry
      if: github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Push Docker image to GHCR
      if: github.ref == 'refs/heads/main'
      run: |
        REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
        docker tag tasksphere-backend:${{ github.sha }} ghcr.io/${REPO_OWNER}/tasksphere-backend:${{ github.sha }}
        docker tag tasksphere-backend:latest ghcr.io/${REPO_OWNER}/tasksphere-backend:latest
        docker push ghcr.io/${REPO_OWNER}/tasksphere-backend:${{ github.sha }}
        docker push ghcr.io/${REPO_OWNER}/tasksphere-backend:latest

  deploy:
    needs: [test, security, docker-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to production
      env:
        DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      run: |
        echo "Deploying to production..."
        # Add your deployment commands here
        # Example: rsync, docker deploy, etc.
        echo "Deployment complete!"
